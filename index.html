<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北海道之行 2026</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #E2F0D9; margin: 0; font-family: sans-serif; }
        /* 橫向滾動日期條 */
        .date-scroll { overflow-x: auto; display: flex; gap: 8px; padding: 10px; scrollbar-width: none; }
        .date-scroll::-webkit-scrollbar { display: none; }
        .date-card { min-width: 60px; height: 75px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 15px; background: white; transition: 0.3s; }
        .date-card.active { background-color: #EF4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen bg-[#E2F0D9] shadow-xl">
        
        <div class="w-full">
            <img src="./S__457515012_0.jpg" class="w-full h-auto block" alt="北海道博美之旅">
        </div>

        <div class="bg-[#E2F0D9] px-4 -mt-5 relative z-10 rounded-t-[30px] pt-5">
            
            <div class="flex justify-around bg-white p-3 rounded-2xl shadow-sm mb-4">
                <button @click="activeNav = 'map'" :class="activeNav === 'map' ? 'text-pink-500' : 'text-gray-300'"><i class="fa-solid fa-location-dot text-xl"></i></button>
                <button @click="activeNav = 'info'" :class="activeNav === 'info' ? 'text-pink-500' : 'text-gray-300'"><i class="fa-solid fa-circle-info text-xl"></i></button>
                <button @click="activeNav = 'shop'" :class="activeNav === 'shop' ? 'text-pink-500' : 'text-gray-300'"><i class="fa-solid fa-basket-shopping text-xl"></i></button>
                <button @click="activeNav = 'money'" :class="activeNav === 'money' ? 'text-pink-500' : 'text-gray-300'"><i class="fa-solid fa-circle-dollar-to-slot text-xl"></i></button>
            </div>

            <div v-if="activeNav === 'map'">
                <div class="date-scroll mb-4">
                    <div v-for="(day, index) in schedule" :key="index" 
                         @click="selectedDay = index"
                         class="date-card shadow-sm" :class="{'active': selectedDay === index}">
                        <span class="text-[10px] uppercase">{{ day.week }}</span>
                        <span class="text-lg font-bold">{{ day.dateNum }}</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div v-for="item in schedule[selectedDay].events" class="bg-white p-4 rounded-2xl shadow-sm">
                        <div class="flex items-start gap-3">
                            <div class="text-pink-500 font-bold text-sm pt-1">{{ item.time }}</div>
                            <div>
                                <h4 class="font-bold text-gray-800">{{ item.title }}</h4>
                                <p class="text-xs text-gray-400 mt-1"><i class="fa-solid fa-paw mr-1 text-[10px]"></i>{{ item.desc }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="activeNav === 'money'" class="space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">💱 即時匯率換算 (JPY ➔ TWD)</h3>
                    <input v-model="jpyInput" type="number" class="w-full bg-gray-50 border-none rounded-xl p-3 text-center text-lg outline-none" placeholder="輸入日圓金額">
                    <div class="text-center mt-3 text-2xl font-black text-pink-500">≈ {{ (jpyInput * rate).toFixed(0) }} 元</div>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm">
                    <h3 class="text-sm font-bold text-gray-700 mb-3">💰 總消費累計 (日圓)</h3>
                    <div class="text-3xl font-black text-blue-500">¥ {{ totalSpend }}</div>
                </div>
            </div>

            <div v-if="activeNav === 'shop'" class="bg-white p-5 rounded-2xl shadow-sm min-h-[200px]">
                <h3 class="font-bold mb-4">🛒 購物清單</h3>
                <div class="flex gap-2 mb-4">
                    <input v-model="newTool" class="flex-1 bg-gray-100 rounded-lg px-3 py-2 text-sm" placeholder="想買什麼？">
                    <button @click="addTool" class="bg-pink-400 text-white px-4 rounded-lg">＋</button>
                </div>
                <div v-for="t in tools" class="flex items-center gap-2 mb-2 text-sm">
                    <input type="checkbox" v-model="t.done" class="accent-pink-500">
                    <span :class="{'line-through text-gray-300': t.done}">{{ t.name }}</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const activeNav = ref('map');
                const selectedDay = ref(0);
                const jpyInput = ref(1000);
                const rate = ref(0.21);
                
                // 行程資料 (對應 115.03.29 - 04.04)
                const schedule = ref([
                    { week: 'Sun', dateNum: '29', dateFull: '115.03.29', events: [
                        { time: '13:00', title: '酷航 TR892 出發', desc: '桃園機場報到啟程' },
                        { time: '17:55', title: '抵達新千歲機場 (CTS)', desc: '領取行李、辦理入境' },
                        { time: '18:30', title: '預約接機/租車', desc: '前往札幌市區入住' }
                    ]},
                    { week: 'Mon', dateNum: '30', dateFull: '115.03.30', events: [
                        { time: '09:00', title: '旭山動物園', desc: '看企鵝散步、北極熊' }
                    ]},
                    { week: 'Tue', dateNum: '31', dateFull: '115.03.31', events: [
                        { time: '10:00', title: '美瑛拼布之路', desc: '享受絕美雪景' }
                    ]},
                    { week: 'Wed', dateNum: '01', dateFull: '115.04.01', events: [
                        { time: '11:00', title: '小樽運河', desc: '浪漫散步與甜點' }
                    ]},
                    { week: 'Thu', dateNum: '02', dateFull: '115.04.02', events: [
                        { time: '09:00', title: '狸小路採買', desc: '最後衝刺藥妝伴手禮' }
                    ]},
                    { week: 'Fri', dateNum: '03', dateFull: '115.04.03', events: [
                        { time: '10:00', title: '定山溪溫泉', desc: '放鬆身心一日遊' }
                    ]},
                    { week: 'Sat', dateNum: '04', dateFull: '115.04.04', events: [
                        { time: '15:00', title: '新千歲機場免稅店', desc: '最後大採購' },
                        { time: '19:10', title: '酷航返台', desc: '預計 22:30 抵達台北' }
                    ]}
                ]);

                // 購物清單邏輯
                const tools = ref(JSON.parse(localStorage.getItem('hkd_tools') || '[]'));
                const newTool = ref('');
                const addTool = () => { if(newTool.value){ tools.value.push({name: newTool.value, done:false}); newTool.value=''; save(); } };
                const save = () => localStorage.setItem('hkd_tools', JSON.stringify(tools.value));

                onMounted(async () => {
                    try {
                        const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                        const data = await res.json();
                        rate.value = data.rates.TWD;
                    } catch (e) { console.log("匯率自動更新失敗"); }
                });

                return { activeNav, selectedDay, schedule, jpyInput, rate, tools, newTool, addTool, save };
            }
        }).mount('#app')
    </script>
</body>
</html>
